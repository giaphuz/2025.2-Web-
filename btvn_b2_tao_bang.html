<!doctype html>
<html lang="en">
  <head>
    <!-- Quyết định style-->
    <style>
      table,
      th,
      td {
        border: 1px solid black;
        border-collapse: separate;
      }
    </style>
    <!-- Bộ chọn của CSS, áp dụng chung 
     các thuộc tính cho table(toàn bộ bảng), th(ô tiêu đề), td(ô dữ liệu)-->
    <!-- border: đường viền 
          border-collapse: thuộc tính đường viền, ở đây là không dùng chung viền-->
    <!-- Quyết định style-->

    <!--Mặc định -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- Mặc định-->
  </head>
  <body style="background-color: lightyellow">
    <table
      style="
        width: 30%;
        margin: 0 auto;
        margin-top: 350px;
        background-color: white;
      "
    >
      <!-- 
    tr: tạo 1 hàng trong bảng
    th: ô tiêu đề 
    td: ô nội dung
    -->
      <!-- colspan: cột, rowpan: hàng-->
      <tr>
        <th colspan="2" rowspan="2"></th>
        <th colspan="3">Clothes</th>
        <th colspan="2">Accessories</th>
      </tr>
      <tr>
        <th>Trousers</th>
        <th>Skrits</th>
        <th>Dressed</th>
        <th>Bracelets</th>
        <th>Rings</th>
      </tr>
      <tr>
        <th rowspan="3">Belgium</th>
        <th>Antwerp</th>
        <td>56</td>
        <td>22</td>
        <td>43</td>
        <td>72</td>
        <td>23</td>
      </tr>
      <tr>
        <th>Gent</th>
        <td>46</td>
        <td>18</td>
        <td>50</td>
        <td>61</td>
        <td>15</td>
      </tr>
      <tr>
        <th>Brussels</th>
        <td>51</td>
        <td>27</td>
        <td>38</td>
        <td>69</td>
        <td>28</td>
      </tr>
      <tr>
        <th rowspan="2">The Netherlands</th>
        <th>Amsterdam</th>
        <td>89</td>
        <td>34</td>
        <td>69</td>
        <td>85</td>
        <td>38</td>
      </tr>
      <tr>
        <th>Utrecht</th>
        <td>80</td>
        <td>12</td>
        <td>43</td>
        <td>36</td>
        <td>19</td>
      </tr>
    </table>
  </body>
</html>
